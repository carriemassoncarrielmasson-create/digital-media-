<!DOCTYPE html>
<html>
<head>
  <title>My Stories</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 50px;
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      padding: 30px;
      background: white;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>My Stories</h1>

  <div class="container">

    <a class="card" href="story1.html">
      <div class="title">Edinburgh Housing Crisis</div>
      <div class="desc">Explore Scotland’s highest rental burden</div>
    </a>

    <a class="card" href="story2.html">
      <div class="title">Anxiety & Loneliness</div>
      <div class="desc">Mental health trends across Scotland</div>
    </a>

  </div>

</body>
</html>
